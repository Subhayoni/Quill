{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
{% endblock %}

{% block body %}

{% include 'navbar2.html' %}

<div class="contact-container">

    <h1>Contact Us</h1>
    <p>We’d love to hear your feedback or suggestions!</p>

    <form action="{{ url_for('Contact') }}" method="POST" class="contact-form"></form>

        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="message">Your Feedback / Review</label>
        <textarea id="message" name="message" rows="6" placeholder="Write your feedback..." required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

</div>

{% endblock %}
